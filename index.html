<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Productos</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
</head>
<body class="w3-light-grey">

    <div class="w3-content w3-margin-top" style="max-width:1000px;">

        <div class="w3-container w3-blue w3-card-4 w3-round">
            <h2>Sistema de Gestión de Productos</h2>
        </div>

        <div class="w3-row-padding w3-margin-top">
            
            <div class="w3-col m4 s12 w3-margin-bottom">
                <div class="w3-card-4 w3-white w3-padding w3-round">
                    <h3 id="form-title" class="w3-text-blue">Agregar Producto</h3>
                    
                    <form id="product-form" onsubmit="saveProduct(event)">
                        <input type="hidden" id="product-id">

                        <p>
                            <label class="w3-text-grey"><b>Nombre del Producto</b></label>
                            <input class="w3-input w3-border w3-round" type="text" id="product-name" required>
                        </p>
                        <p>
                            <label class="w3-text-grey"><b>Precio ($)</b></label>
                            <input class="w3-input w3-border w3-round" type="number" step="0.01" id="product-price" required>
                        </p>
                        <p>
                            <label class="w3-text-grey"><b>Stock</b></label>
                            <input class="w3-input w3-border w3-round" type="number" id="product-stock" required>
                        </p>
                        
                        <button type="submit" id="btn-submit" class="w3-button w3-block w3-green w3-round w3-margin-bottom">
                            Guardar Producto
                        </button>
                        <button type="button" id="btn-cancel" onclick="clearForm()" class="w3-button w3-block w3-red w3-round w3-hide">
                            Cancelar Edición
                        </button>
                    </form>
                </div>
            </div>

            <div class="w3-col m8 s12">
                <div class="w3-card-4 w3-white w3-padding w3-round w3-responsive">
                    <h3 class="w3-text-blue">Listado de Productos</h3>
                    
                    <table class="w3-table-all w3-hoverable w3-centered">
                        <thead>
                            <tr class="w3-blue">
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="product-table-body">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Base de datos simulada en memoria (puedes cambiarla por localStorage si deseas)
        let products = [
            { id: 1, name: "Laptop HP", price: 650.00, stock: 10 },
            { id: 2, name: "Mouse Óptico", price: 15.50, stock: 50 },
            { id: 3, name: "Teclado Mecánico", price: 45.00, stock: 25 }
        ];
        
        let nextId = 4;

        // Función para renderizar la tabla de productos
        function renderTable() {
            const tbody = document.getElementById("product-table-body");
            tbody.innerHTML = ""; // Limpiar tabla

            if (products.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="w3-text-grey">No hay productos registrados</td></tr>`;
                return;
            }

            products.forEach(product => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${product.id}</td>
                    <td>${product.name}</td>
                    <td>$${product.price.toFixed(2)}</td>
                    <td>${product.stock}</td>
                    <td>
                        <button class="w3-button w3-amber w3-padding-small w3-round" onclick="editProduct(${product.id})">?? Editar</button>
                        <button class="w3-button w3-red w3-padding-small w3-round" onclick="deleteProduct(${product.id})">??? Eliminar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Función para Guardar o Actualizar un producto
        function saveProduct(event) {
            event.preventDefault(); // Evita que la página se recargue

            const id = document.getElementById("product-id").value;
            const name = document.getElementById("product-name").value;
            const price = parseFloat(document.getElementById("product-price").value);
            const stock = parseInt(document.getElementById("product-stock").value);

            if (id) {
                // Modo Edición: Buscar el producto y actualizarlo
                const index = products.findIndex(p => p.id == id);
                if (index !== -1) {
                    products[index] = { id: parseInt(id), name, price, stock };
                }
            } else {
                // Modo Creación: Añadir nuevo producto
                const newProduct = { id: nextId++, name, price, stock };
                products.push(newProduct);
            }

            clearForm();
            renderTable();
        }

        // Función para pasar los datos de la tabla al formulario (Modo Edición)
        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (product) {
                document.getElementById("product-id").value = product.id;
                document.getElementById("product-name").value = product.name;
                document.getElementById("product-price").value = product.price;
                document.getElementById("product-stock").value = product.stock;

                // Cambiar textos de la interfaz gráfica
                document.getElementById("form-title").innerText = "Editar Producto #" + product.id;
                document.getElementById("btn-submit").innerText = "Actualizar Cambios";
                document.getElementById("btn-cancel").classList.remove("w3-hide");
            }
        }

        // Función para Eliminar un producto
        function deleteProduct(id) {
            if (confirm("¿Estás seguro de que deseas eliminar este producto?")) {
                products = products.filter(p => p.id !== id);
                // Si estábamos editando el producto eliminado, limpiamos el formulario
                if (document.getElementById("product-id").value == id) {
                    clearForm();
                }
                renderTable();
            }
        }

        // Función para limpiar el formulario y restablecer los botones
        function clearForm() {
            document.getElementById("product-form").reset();
            document.getElementById("product-id").value = "";
            
            document.getElementById("form-title").innerText = "Agregar Producto";
            document.getElementById("btn-submit").innerText = "Guardar Producto";
            document.getElementById("btn-cancel").classList.add("w3-hide");
        }

        // Cargar la tabla inicialmente al abrir la página
        renderTable();
    </script>

</body>
</html>
